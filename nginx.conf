server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/public;

    # Schakel symlinks in voor storage
    disable_symlinks off;

    location / {
        # Geen cache voor de HTML (Inertia regelt de asset versioning)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Geen cache voor PHP responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Serveer storage bestanden
    location /storage/ {
        alias /var/www/storage/app/public/;
        add_header Access-Control-Allow-Origin *;
        autoindex on;
    }

    # Agressieve cache voor de unieke ge-hashte assets van Vite
    location ~* /build/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}

server {
    listen 80;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    # Docker's embedded DNS — re-resolve the app upstream at runtime so a
    # rebuilt app container (new IP) is picked up without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Long-running compiles (Rmd → PDF can take minutes)
        fastcgi_read_timeout 600s;
        fastcgi_send_timeout 600s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

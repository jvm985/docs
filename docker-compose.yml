services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docs-app
    restart: always
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=docs
      - DB_USERNAME=docs_user
      - DB_PASSWORD=docs_password
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: docs-db
    restart: always
    environment:
      - POSTGRES_DB=docs
      - POSTGRES_USER=docs_user
      - POSTGRES_PASSWORD=docs_password
    volumes:
      - docs_db_data:/var/lib/postgresql/data

  web:
    image: nginx:alpine
    container_name: docs-web
    restart: always
    ports:
      - "127.0.0.1:8030:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  docs_db_data:

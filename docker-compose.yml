name: docs

services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - public:/var/www/html/public
      - storage:/var/www/html/storage
      - ./r-site-library:/opt/r-site-library
    environment:
      R_LIB_DIR: /opt/r-site-library
    env_file: .env

  worker:
    build: .
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - storage:/var/www/html/storage
      - ./r-site-library:/opt/r-site-library
    environment:
      R_LIB_DIR: /opt/r-site-library
    env_file: .env

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
    depends_on:
      - app

volumes:
  public:
  storage:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docs-app
    restart: always
    environment:
      - APP_NAME=Docs
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://docs.irishof.cloud
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=docs
      - DB_USERNAME=docs_user
      - DB_PASSWORD=docs_password
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=https://docs.irishof.cloud/auth/google/callback
      - SESSION_DRIVER=database
      - SESSION_SECURE_COOKIE=true
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
      - /var/www/public/build
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: docs-db
    restart: always
    environment:
      - POSTGRES_DB=docs
      - POSTGRES_USER=docs_user
      - POSTGRES_PASSWORD=docs_password
    volumes:
      - docs_db_data:/var/lib/postgresql/data

  web:
    image: nginx:alpine
    container_name: docs-web
    restart: always
    ports:
      - "127.0.0.1:8030:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  docs_db_data:

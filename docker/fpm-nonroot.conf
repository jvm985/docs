; PHP-FPM running as www-data can't open /proc/self/fd/2 (default error_log)
; because that fd was created by dockerd as root. Point to writable files
; in the storage volume. Worker stdout/stderr still surfaces via
; catch_workers_output.

[global]
error_log = /var/www/html/storage/logs/php-fpm.log

[www]
access.log = /var/www/html/storage/logs/php-fpm-access.log
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

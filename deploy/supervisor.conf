[program:docs-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/docs/artisan queue:work --sleep=3 --tries=3 --timeout=120
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/docs/storage/logs/worker.log
stopwaitsecs=180
